name: Build
on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
permissions:
    contents: read
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "20"

            - name: setup pnpm and caching
              uses: pnpm/action-setup@v6
              with:
                  cache: true

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: npm run build
